<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Test — Minimal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #1c1b18; color: #f0ede8; font-family: -apple-system, sans-serif; }
  .strip { display: flex; height: 100%; transition: none; will-change: transform; }
  .page { flex-shrink: 0; width: 100vw; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 80px; font-weight: 200; opacity: 0.15; }
  #debug { position: fixed; top: 0; left: 0; right: 0; padding: 8px 16px; background: rgba(0,0,0,0.8); font: 13px/1.6 'SF Mono', monospace; color: #6bbe9b; z-index: 100; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="debug">Waiting for wheel events... swipe trackpad horizontally</div>
<div class="strip" id="strip">
  <div class="page" style="background:#252420">0</div>
  <div class="page" style="background:#2a2520">1</div>
  <div class="page" style="background:#20252a">2</div>
  <div class="page" style="background:#252a20">3</div>
  <div class="page" style="background:#2a2025">4</div>
  <div class="page" style="background:#202a25">5</div>
  <div class="page" style="background:#25202a">6</div>
  <div class="page" style="background:#252420">7</div>
</div>
<script>
const strip = document.getElementById('strip');
const debug = document.getElementById('debug');
const totalPages = 8;
let offsetPx = 0;
let eventCount = 0;
let pageWidth = window.innerWidth;

window.addEventListener('resize', () => { pageWidth = window.innerWidth; });

// 3 tests in one:
// Test A: raw offset follows deltaX directly (simplest possible)
// Test B: accumulated page-flip (like v11.0's simple wheel)
let accumX = 0;
let currentPage = 0;

document.addEventListener('wheel', function(e) {
  e.preventDefault();
  eventCount++;
  
  const dx = e.deltaX;
  const dy = e.deltaY;
  
  // Test A: direct follow — page strip follows finger
  offsetPx -= dx * 2.5;
  // Clamp
  offsetPx = Math.max(-(totalPages - 1) * pageWidth, Math.min(0, offsetPx));
  strip.style.transform = `translate3d(${offsetPx}px,0,0)`;
  
  debug.textContent = `events: ${eventCount} | dX: ${dx.toFixed(1)} dY: ${dy.toFixed(1)} mode: ${e.deltaMode}\noffset: ${Math.round(offsetPx)}px | page: ${Math.round(-offsetPx / pageWidth)}\naccumX: ${accumX.toFixed(0)} | browser: ${navigator.userAgent.slice(0, 60)}`;
  
}, { passive: false });

debug.textContent += `\npageWidth: ${pageWidth}px | listening on document`;
</script>
</body>
</html>
