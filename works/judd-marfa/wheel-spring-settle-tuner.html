<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel v4.15d + Spring Settle Tuner</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #1c1b18; --surface: #252420; --border: #35332e;
    --text: #f0ede8; --text-dim: #7d7a73; --text-mid: #b5b2ab;
    --accent-tp: #6ba3be; --accent-go: #7bbe6b; --accent-settle: #6bbe9b;
    --accent-warn: #be6b6b; --accent-momentum: #9b6bbe;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px; overflow: hidden; height: 100vh;
    display: flex; flex-direction: column;
  }
  .sim-area { flex: 1; position: relative; overflow: hidden; }
  .strip { display: flex; height: 100%; will-change: transform; }
  .page {
    flex-shrink: 0; width: 100vw; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 72px; font-weight: 200; color: rgba(255,255,255,0.1);
  }
  .dots {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); opacity: 0.3; transition: opacity 0.3s; }
  .dot.active { opacity: 1; background: var(--text); }
  .hud {
    position: absolute; top: 10px; left: 14px; right: 14px;
    display: flex; justify-content: space-between; z-index: 10; pointer-events: none;
  }
  .hud-l, .hud-r { font: 11px/1.8 'SF Mono', Menlo, monospace; color: var(--text-dim); }
  .hud-r { text-align: right; }
  .velocity-graph { height: 100px; flex-shrink: 0; border-top: 1px solid var(--border); position: relative; }
  .velocity-graph canvas { width: 100%; height: 100%; display: block; }
  .vg-label { position: absolute; top: 4px; left: 8px; font: 10px/1 -apple-system, sans-serif; color: var(--text-dim); }
  .vg-legend { position: absolute; top: 4px; right: 8px; font: 10px/1 -apple-system, sans-serif; display: flex; gap: 12px; color: var(--text-dim); }
  .lsw { display: inline-block; width: 10px; height: 3px; border-radius: 1px; vertical-align: middle; margin-right: 3px; }
  .controls {
    flex-shrink: 0; border-top: 1px solid var(--border);
    padding: 8px 14px; display: flex; gap: 16px; align-items: center;
    flex-wrap: wrap; background: var(--surface);
  }
  .cg { display: flex; align-items: center; gap: 5px; }
  .cg label { font-size: 11px; color: var(--text-dim); min-width: 56px; }
  .cg input[type="range"] { -webkit-appearance: none; width: 100px; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
  .cg input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text-mid); cursor: pointer; border: 2px solid var(--bg); }
  .cv { font: 11px/1 'SF Mono', monospace; color: var(--text-mid); min-width: 28px; text-align: right; }
  .cb { background: var(--border); color: var(--text-mid); border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .cb:hover { background: var(--text-dim); color: var(--bg); }
  .cn { font-size: 10px; color: var(--text-dim); }
  .cn .v { color: var(--accent-settle); }
</style>
</head>
<body>
<div class="sim-area">
  <div class="strip" id="strip">
    <div class="page" style="background:#252420">0</div>
    <div class="page" style="background:#2a2520">1</div>
    <div class="page" style="background:#20252a">2</div>
    <div class="page" style="background:#252a20">3</div>
    <div class="page" style="background:#2a2025">4</div>
    <div class="page" style="background:#202a25">5</div>
    <div class="page" style="background:#25202a">6</div>
    <div class="page" style="background:#252420">7</div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="hud"><div class="hud-l" id="hudL">idle</div><div class="hud-r" id="hudR">0 px/s</div></div>
</div>
<div class="velocity-graph">
  <canvas id="vc"></canvas>
  <div class="vg-label">velocity (px/s)</div>
  <div class="vg-legend">
    <span><span class="lsw" style="background:var(--accent-tp)"></span>tracking</span>
    <span><span class="lsw" style="background:var(--accent-settle)"></span>spring</span>
    <span><span class="lsw" style="background:var(--accent-warn)"></span>transition</span>
  </div>
</div>
<div class="controls">
  <div class="cg"><label>stiffSlow</label><input type="range" id="sSs" min="5" max="60" step="1" value="20"><span class="cv" id="vSs">20</span></div>
  <div class="cg"><label>stiffFast</label><input type="range" id="sSf" min="15" max="120" step="1" value="55"><span class="cv" id="vSf">55</span></div>
  <div class="cg"><label>dampRatio</label><input type="range" id="sDr" min="0.60" max="1.40" step="0.05" value="1.00"><span class="cv" id="vDr">1.00</span></div>
  <div class="cg"><label>velThresh</label><input type="range" id="sVt" min="200" max="2000" step="50" value="800"><span class="cv" id="vVt">800</span></div>
  <div class="cg"><label>followGain</label><input type="range" id="sG" min="0.5" max="4.0" step="0.05" value="1.00"><span class="cv" id="vG">1.00</span></div>
  <div class="cg"><label>commitR</label><input type="range" id="sC" min="0.05" max="0.40" step="0.01" value="0.15"><span class="cv" id="vC">0.15</span></div>
  <div class="cg"><label>releaseMs</label><input type="range" id="sR" min="30" max="200" step="5" value="80"><span class="cv" id="vR">80</span></div>
  <div class="cg"><label>coastDecay</label><input type="range" id="sCd" min="0.85" max="0.99" step="0.01" value="0.95"><span class="cv" id="vCd">0.95</span></div>
  <div class="cn">slow: k=<span class="v" id="critSlow">20</span> c=<span class="v" id="critSlowC">8.9</span> | fast: k=<span class="v" id="critFast">55</span> c=<span class="v" id="critFastC">14.8</span> | <span class="v" id="dampSt">critical</span></div>
  <button class="cb" id="bCopy">Copy</button>
  <button class="cb" id="bReset">Reset</button>
</div>

<script>
// ============================================================
// Wheel v4.15d + Spring Settle Tuner
//
// FULL v4.15d engine preserved:
//   normalizeWheel, tanh softcap, axis lock (pre-follow),
//   birth classifier, full commit logic (microReverseTolerance,
//   flickVelocity, directFlickVelocity, min distance gates)
//
// CHANGED: easeOutCubic settle → spring physics settle
// ADDED: coasting during release grace period
// ============================================================

var strip = document.getElementById('strip');
var totalPages = 8;
function pw() { return window.innerWidth; }

// --- Parameters (exposed to sliders) ---
var P = {
  followGain: 1.00,
  edgeResistance: 0.20,
  commitDistanceRatio: 0.15,
  flickVelocity: 0.80,
  directFlickVelocity: 1.60,
  microReverseTolerance: 0.03,
  releaseGraceMs: 80,
  // Spring settle — velocity-dependent
  stiffSlow: 20,       // gentle drag → soft landing
  stiffFast: 55,       // quick flick → firmer landing
  dampRatio: 1.00,     // 1.0 = critical (no bounce), <1 = slight bounce, >1 = sluggish
  velThreshold: 800,   // px/s — below=slow, above=fast, between=interpolated
  coastDecay: 0.95
};

// --- Internal constants (not on sliders) ---
var I = {
  axisLockMinDeltaPx: 10,
  axisLockRatio: 1.06,
  axisUnlockVerticalRatio: 1.24,
  lockCarryGain: 0.28,
  preFollowGain: 0.16,
  minWheelDeltaPx: 0.05,
  gestureSampleWindowMs: 260,
  idleMomentumGapMs: 80,
  flickMinDistance: 0.10,
  directFlickMinDistance: 0.08,
  birthSampleCount: 4,
  birthDecayRatio: 0.60,
  birthSkipGapMs: 300,
  birthLargeDeltaThreshold: 50
};

// --- State ---
var S = {
  phase: 'idle',
  inputType: 'unknown',
  pageIndex: 0,
  offsetPx: 0,
  velocityPxPerFrame: 0,
  lastInputAt: 0,
  lastTimestamp: 0,
  lastWheelDx: 0,
  eventCount: 0,
  turnCount: 0,
  rafId: 0,
  axisLocked: false,
  inputSamples: [],
  targetLocked: false,
  trackingStartOffset: 0,
  gestureAccumX: 0,
  gestureAccumY: 0,
  gesturePeakVelocity: 0,
  gestureReleaseVelocity: 0,
  gestureEventCount: 0,
  pendingAxisX: 0,
  pendingAxisY: 0,
  pendingAxisSamples: 0,
  gestureId: 0,
  finishInteractionAt: 0,
  momentumFilteredCount: 0,
  birthBuffer: [],
  birthClassifying: false,
  birthRejectedCount: 0,
  // Spring
  springTarget: 0,
  springV: 0,
  settleStartAt: 0,
  settleTargetIndex: 0,
  settleStiffness: 0,   // computed per-settle from velocity
  settleDamping: 0,      // computed per-settle from stiffness + dampRatio
  settleInitSpeed: 0     // for HUD display
};

// --- Helpers ---
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function minOff() { return -((totalPages - 1) * pw()); }
function maxOff() { return 0; }

function dampedOff(raw) {
  if (raw > maxOff()) return maxOff() + (raw - maxOff()) * P.edgeResistance;
  if (raw < minOff()) return minOff() + (raw - minOff()) * P.edgeResistance;
  return raw;
}

function nearestPage(off) { return clamp(Math.round(-off / pw()), 0, totalPages - 1); }
function ppsFromV(vpf) { return Math.abs(vpf) * 60 / pw(); }

function setTx() { strip.style.transform = 'translate3d(' + S.offsetPx + 'px,0,0)'; }

// --- normalizeWheel (from v4.15d) ---
function normalizeWheel(e) {
  var x = e.deltaX, y = e.deltaY;
  if (e.deltaMode === 1) { x *= 16; y *= 16; }
  else if (e.deltaMode === 2) { x *= window.innerHeight; y *= window.innerHeight; }
  return { x: x, y: y };
}

// --- Dots ---
var dotsEl = document.getElementById('dots');
for (var i = 0; i < totalPages; i++) {
  var d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
}
function updateDots() {
  var ds = dotsEl.querySelectorAll('.dot');
  for (var j = 0; j < ds.length; j++) ds[j].classList.toggle('active', j === S.pageIndex);
}

// --- Velocity graph ---
var vc = document.getElementById('vc');
var vx = vc.getContext('2d');
var vData = [];
var VW = 3000;

function resizeCanvas() {
  var r = vc.parentElement.getBoundingClientRect();
  vc.width = r.width * devicePixelRatio;
  vc.height = r.height * devicePixelRatio;
  vx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', function() {
  resizeCanvas();
  S.offsetPx = -(S.pageIndex * pw());
  setTx();
});

function recV(v, ph) {
  var now = performance.now();
  vData.push({ t: now, v: v, p: ph });
  while (vData.length && vData[0].t < now - VW) vData.shift();
}

function drawGraph() {
  var w = vc.width / devicePixelRatio, h = vc.height / devicePixelRatio;
  vx.clearRect(0, 0, w, h);
  if (vData.length < 2) return;
  var now = performance.now(), st = now - VW;
  var mx = 300;
  for (var i = 0; i < vData.length; i++) { var a = Math.abs(vData[i].v); if (a > mx) mx = a; }
  mx = Math.ceil(mx / 200) * 200;
  var zy = h / 2;
  vx.strokeStyle = 'rgba(255,255,255,0.06)'; vx.lineWidth = 1;
  vx.beginPath(); vx.moveTo(0, zy); vx.lineTo(w, zy); vx.stroke();
  vx.fillStyle = 'rgba(255,255,255,0.12)'; vx.font = '9px -apple-system, sans-serif'; vx.textAlign = 'right';
  vx.fillText('+' + mx, w - 4, 10); vx.fillText('-' + mx, w - 4, h - 3);
  vx.lineWidth = 1.5;
  var colors = { tracking: '#6ba3be', coasting: '#6ba3be', settling: '#6bbe9b', idle: '#7d7a73' };
  for (var i = 1; i < vData.length; i++) {
    var a = vData[i - 1], b = vData[i];
    var x0 = ((a.t - st) / VW) * w, x1 = ((b.t - st) / VW) * w;
    var y0 = zy - (a.v / mx) * (h / 2 - 8), y1 = zy - (b.v / mx) * (h / 2 - 8);
    vx.strokeStyle = colors[b.p] || colors.idle;
    vx.beginPath(); vx.moveTo(x0, y0); vx.lineTo(x1, y1); vx.stroke();
    if (a.p !== 'settling' && b.p === 'settling') {
      vx.fillStyle = '#be6b6b'; vx.beginPath(); vx.arc(x1, y1, 4, 0, Math.PI * 2); vx.fill();
    }
  }
}

// ============================================================
// Gesture buffers (from v4.15d)
// ============================================================

function resetGestureBuffers() {
  S.axisLocked = false;
  S.pendingAxisX = 0; S.pendingAxisY = 0; S.pendingAxisSamples = 0;
  S.gestureAccumX = 0; S.gestureAccumY = 0;
  S.gesturePeakVelocity = 0; S.gestureReleaseVelocity = 0;
  S.gestureEventCount = 0; S.lastWheelDx = 0;
  S.birthBuffer = []; S.birthClassifying = false;
}

function finishInteraction() {
  S.phase = 'idle'; S.inputType = 'unknown'; S.inputSamples = [];
  S.velocityPxPerFrame = 0; S.targetLocked = false;
  S.finishInteractionAt = performance.now();
  S.springV = 0;
  resetGestureBuffers();
}

// ============================================================
// Target selection — FULL v4.15d commit logic
// ============================================================

function chooseTargetIndex() {
  var progressPages = -S.offsetPx / pw();
  var base = S.pageIndex;
  var deltaPages = progressPages - base;
  var absDelta = Math.abs(deltaPages);
  var releasePps = ppsFromV(S.gestureReleaseVelocity);
  var peakPps = ppsFromV(S.gesturePeakVelocity);

  var direction = 0;
  if (absDelta > P.microReverseTolerance) {
    direction = deltaPages > 0 ? 1 : -1;
  } else if (Math.abs(S.gestureReleaseVelocity) > 0.01) {
    direction = S.gestureReleaseVelocity < 0 ? 1 : -1;
  } else if (Math.abs(S.gestureAccumX) > 0.01) {
    direction = S.gestureAccumX > 0 ? 1 : -1;
  }
  if (direction === 0) return base;

  var distanceCommit = absDelta >= P.commitDistanceRatio;
  var releaseCommit = releasePps >= P.flickVelocity && absDelta >= I.flickMinDistance;
  var fastCommit = peakPps >= P.directFlickVelocity && absDelta >= I.directFlickMinDistance;

  if (distanceCommit || releaseCommit || fastCommit) {
    return clamp(base + direction, 0, totalPages - 1);
  }
  return base;
}

// ============================================================
// Input classification (from v4.15d)
// ============================================================

function classifyInput(samples) {
  var abs = []; for (var i = 0; i < samples.length; i++) abs.push(Math.abs(samples[i].d));
  var avg = 0; for (var i = 0; i < abs.length; i++) avg += abs[i]; avg /= abs.length;
  var dts = []; for (var i = 1; i < samples.length; i++) dts.push(samples[i].t - samples[i - 1].t);
  var avgDt = 16; if (dts.length) { avgDt = 0; for (var i = 0; i < dts.length; i++) avgDt += dts[i]; avgDt /= dts.length; }
  var small = 0; for (var i = 0; i < abs.length; i++) if (abs[i] < 15) small++;
  if (small >= 2 && avgDt < 28 && avg < 20) return 'trackpad';
  if (avg > 28 && avgDt >= 22) return 'mouse';
  return 'trackpad';
}

// ============================================================
// Tracking entry — FULL v4.15d logic
// ============================================================

function beginTrackingIfNeeded(now) {
  if (S.phase === 'tracking') return true;

  if (S.phase === 'settling') {
    var elapsed = now - S.settleStartAt;
    if (elapsed < 50) return false;
    S.offsetPx = S.offsetPx; // keep current spring position
    S.pageIndex = nearestPage(S.offsetPx);
    S.gestureId++;
    S.phase = 'tracking';
    S.trackingStartOffset = S.offsetPx;
    S.targetLocked = false;
    S.velocityPxPerFrame = 0;
    S.springV = 0;
    resetGestureBuffers();
    return true;
  }

  // Momentum gap filter
  var idleGapMs = Infinity;
  if (S.finishInteractionAt > 0) {
    var gap = now - S.finishInteractionAt;
    if (gap < I.idleMomentumGapMs) {
      S.momentumFilteredCount++;
      return false;
    }
    idleGapMs = gap;
    S.finishInteractionAt = 0;
  }

  S.gestureId++;
  S.phase = 'tracking';
  S.trackingStartOffset = -(S.pageIndex * pw());
  S.targetLocked = false;

  if (idleGapMs > I.birthSkipGapMs) {
    // Long gap — skip birth classification
  } else {
    S.birthClassifying = true;
    S.birthBuffer = [];
  }
  return true;
}

// ============================================================
// Birth classifier (from v4.15d)
// ============================================================

function classifyBirth(buffer) {
  var deltas = []; for (var i = 0; i < buffer.length; i++) deltas.push(buffer[i].absDx);
  var earlyAvg = (deltas[0] + deltas[1] + deltas[2]) / 3;
  if (earlyAvg > I.birthLargeDeltaThreshold) return 'momentum';
  var dec = 0;
  for (var i = 1; i < deltas.length; i++) if (deltas[i] < deltas[i - 1]) dec++;
  var total = deltas.length - 1;
  return (dec / total) >= I.birthDecayRatio ? 'momentum' : 'real';
}

function replayBirthBuffer() {
  var softCap = pw() * 0.10;
  for (var k = 0; k < S.birthBuffer.length; k++) {
    var sample = S.birthBuffer[k];
    var rawMove = sample.dx * P.followGain;
    var effectiveMove = softCap > 0
      ? (rawMove > 0 ? 1 : -1) * softCap * Math.tanh(Math.abs(rawMove) / softCap)
      : rawMove;
    S.offsetPx = dampedOff(S.offsetPx - effectiveMove);
    var maxTravel = pw();
    var upper = S.trackingStartOffset + maxTravel;
    var lower = S.trackingStartOffset - maxTravel;
    S.offsetPx = clamp(S.offsetPx, Math.max(lower, minOff()), Math.min(upper, maxOff()));
    S.gestureAccumX += sample.dx;
    S.gestureEventCount++;
  }
}

// ============================================================
// Spring settle
// ============================================================

function startSpringSettle(targetIndex) {
  var prev = S.pageIndex;
  S.settleTargetIndex = clamp(targetIndex, 0, totalPages - 1);
  S.pageIndex = S.settleTargetIndex;
  S.springTarget = -(S.pageIndex * pw());
  // Velocity continuity: convert from px/frame to px/s
  S.springV = S.velocityPxPerFrame * 60;
  S.settleInitSpeed = Math.abs(S.springV);

  // Velocity-dependent stiffness interpolation
  // slow (0 px/s) → stiffSlow, fast (velThreshold px/s) → stiffFast
  var speedAbs = Math.abs(S.springV);
  var t = clamp(speedAbs / Math.max(P.velThreshold, 1), 0, 1);
  S.settleStiffness = lerp(P.stiffSlow, P.stiffFast, t);
  // Damping auto-calculated: dampRatio × critical damping for this stiffness
  // critical = 2 × sqrt(stiffness)
  S.settleDamping = P.dampRatio * 2 * Math.sqrt(S.settleStiffness);

  S.settleStartAt = performance.now();
  S.phase = 'settling';
  if (prev !== S.pageIndex) S.turnCount++;
  updateDots();
}

// ============================================================
// Wheel handler — FULL v4.15d + spring settle
// ============================================================

function handleWheel(e) {
  var now = performance.now();
  var norm = normalizeWheel(e);
  var x = norm.x, y = norm.y;
  var absX = Math.abs(x), absY = Math.abs(y);
  if (absX < 0.01 && absY < 0.01) return;

  // Prevent browser navigation — MUST be before any return
  e.preventDefault();

  var dx = x;

  // === Axis lock with pre-follow (v4.15d) ===
  if (!S.axisLocked) {
    S.pendingAxisX += x;
    S.pendingAxisY += y;
    S.pendingAxisSamples++;

    // Pre-follow: micro-movement before lock confirms
    if (absX > absY * 0.95) {
      var preRaw = S.offsetPx - x * I.preFollowGain * P.followGain;
      S.offsetPx = dampedOff(preRaw);
      setTx();
    }

    var lockX = Math.abs(S.pendingAxisX), lockY = Math.abs(S.pendingAxisY);
    var enough = (lockX + lockY) >= I.axisLockMinDeltaPx || S.pendingAxisSamples >= 4;

    if (!enough) {
      S.lastInputAt = now;
      cancelAnimationFrame(S.rafId);
      S.rafId = requestAnimationFrame(tick);
      return;
    }

    if (lockX > lockY * I.axisLockRatio) {
      S.axisLocked = true;
      dx = x + clamp(S.pendingAxisX * I.lockCarryGain, -20, 20);
      S.pendingAxisX = 0; S.pendingAxisY = 0; S.pendingAxisSamples = 0;
    } else if (lockY > lockX * I.axisUnlockVerticalRatio) {
      S.pendingAxisX *= 0.40; S.pendingAxisY *= 0.40; S.pendingAxisSamples = 1;
      S.lastInputAt = now;
      cancelAnimationFrame(S.rafId);
      S.rafId = requestAnimationFrame(tick);
      return;
    } else {
      S.lastInputAt = now;
      cancelAnimationFrame(S.rafId);
      S.rafId = requestAnimationFrame(tick);
      return;
    }
  }

  if (Math.abs(dx) < I.minWheelDeltaPx) return;

  if (!beginTrackingIfNeeded(now)) {
    S.axisLocked = false; S.pendingAxisX = 0; S.pendingAxisY = 0; S.pendingAxisSamples = 0;
    return;
  }

  var dt = Math.max(now - (S.lastInputAt || now), 8);

  // === Birth classifier (v4.15d) ===
  if (S.birthClassifying) {
    S.birthBuffer.push({ dx: dx, absDx: Math.abs(dx), t: now });
    if (S.birthBuffer.length >= I.birthSampleCount) {
      S.lastInputAt = now; S.eventCount++;
      var result = classifyBirth(S.birthBuffer);
      if (result === 'momentum') {
        S.birthRejectedCount++;
        S.phase = 'idle';
        S.finishInteractionAt = performance.now();
        resetGestureBuffers();
        cancelAnimationFrame(S.rafId);
        S.rafId = requestAnimationFrame(tick);
        return;
      }
      S.birthClassifying = false;
      replayBirthBuffer();
      setTx();
      for (var k = 0; k < S.birthBuffer.length; k++) {
        S.inputSamples.push({ t: S.birthBuffer[k].t, d: S.birthBuffer[k].dx });
      }
      S.inputSamples = S.inputSamples.filter(function(s) { return now - s.t <= I.gestureSampleWindowMs; });
      if (S.inputType === 'unknown' && S.inputSamples.length >= 3) {
        S.inputType = classifyInput(S.inputSamples);
      }
      cancelAnimationFrame(S.rafId);
      S.rafId = requestAnimationFrame(tick);
      return;
    } else {
      S.lastInputAt = now; S.eventCount++;
      cancelAnimationFrame(S.rafId);
      S.rafId = requestAnimationFrame(tick);
      return;
    }
  }

  // === Normal delta application with tanh softcap (v4.15d) ===
  var rawMove = dx * P.followGain;
  var softCap = pw() * 0.10;
  var effectiveMove = softCap > 0
    ? (rawMove > 0 ? 1 : -1) * softCap * Math.tanh(Math.abs(rawMove) / softCap)
    : rawMove;
  S.offsetPx = dampedOff(S.offsetPx - effectiveMove);

  // Max tracking distance cap — spring settle covers the rest
  var maxTravel = pw();
  var upper = S.trackingStartOffset + maxTravel;
  var lower = S.trackingStartOffset - maxTravel;
  S.offsetPx = clamp(S.offsetPx, Math.max(lower, minOff()), Math.min(upper, maxOff()));

  // Velocity from effectiveMove (v4.12 fix)
  var rawVelocity = -effectiveMove / (dt / 16.6667);
  var maxV = pw() * 0.15;
  var cappedV = clamp(rawVelocity, -maxV, maxV);
  S.velocityPxPerFrame = lerp(S.velocityPxPerFrame, cappedV, 0.36);

  S.lastWheelDx = dx;
  S.lastInputAt = now;
  S.eventCount++;
  S.gestureEventCount++;
  S.gestureAccumX += dx;
  S.gestureAccumY += y;
  S.gesturePeakVelocity = Math.max(S.gesturePeakVelocity, Math.abs(S.velocityPxPerFrame));

  S.inputSamples.push({ t: now, d: dx });
  S.inputSamples = S.inputSamples.filter(function(s) { return now - s.t <= I.gestureSampleWindowMs; });
  if (S.inputType === 'unknown' && S.inputSamples.length >= 3) {
    S.inputType = classifyInput(S.inputSamples);
  }

  recV(S.velocityPxPerFrame * 60, 'tracking');
  setTx();
  updateHUD();
  cancelAnimationFrame(S.rafId);
  S.rafId = requestAnimationFrame(tick);
}

// Listen on document (same as working minimal test)
document.addEventListener('wheel', handleWheel, { passive: false });

// ============================================================
// Tick — coasting + spring settle
// ============================================================

function tick(now) {
  if (!S.lastTimestamp) S.lastTimestamp = now;
  var frameDt = clamp(now - S.lastTimestamp, 8, 34);
  S.lastTimestamp = now;

  if (S.phase === 'tracking') {
    var sinceLast = now - S.lastInputAt;

    // COASTING: after wheel events stop, keep moving with decaying velocity
    if (sinceLast > 20 && Math.abs(S.velocityPxPerFrame) > 0.1) {
      S.velocityPxPerFrame *= P.coastDecay;
      var coastMove = S.velocityPxPerFrame * (frameDt / 16.667);
      S.offsetPx += coastMove;
      S.offsetPx = clamp(S.offsetPx, minOff(), maxOff());
      var maxTravel = pw();
      var upper = S.trackingStartOffset + maxTravel;
      var lower = S.trackingStartOffset - maxTravel;
      S.offsetPx = clamp(S.offsetPx, Math.max(lower, minOff()), Math.min(upper, maxOff()));
      recV(S.velocityPxPerFrame * 60, 'coasting');
    }

    // Release detection
    if (sinceLast > P.releaseGraceMs) {
      if (S.birthClassifying) {
        S.birthRejectedCount++;
        S.phase = 'idle';
        S.finishInteractionAt = performance.now();
        resetGestureBuffers();
        updateHUD();
        return;
      }
      if (!S.targetLocked) {
        // Save release velocity BEFORE coasting decay
        // gestureReleaseVelocity was set above from tracking;
        // use current (coasted) velocity for spring, but peak for commit
        S.gestureReleaseVelocity = S.velocityPxPerFrame;
        var target = chooseTargetIndex();
        S.targetLocked = true;
        startSpringSettle(target);
      }
    }
  }

  // Spring physics
  if (S.phase === 'settling') {
    var dt = 1 / 60;
    var steps = Math.max(1, Math.round(frameDt / 16.667));
    for (var i = 0; i < steps; i++) {
      var disp = S.offsetPx - S.springTarget;
      var force = -S.settleStiffness * disp - S.settleDamping * S.springV;
      S.springV += force * dt;
      S.offsetPx += S.springV * dt;
    }
    recV(S.springV, 'settling');

    if (Math.abs(S.offsetPx - S.springTarget) < 0.5 && Math.abs(S.springV) < 5) {
      S.offsetPx = S.springTarget;
      finishInteraction();
    }
  }

  setTx();
  updateHUD();
  drawGraph();

  if (S.phase !== 'idle') {
    S.rafId = requestAnimationFrame(tick);
  } else {
    S.lastTimestamp = 0;
  }
}

// ============================================================
// HUD
// ============================================================

function updateHUD() {
  var vPxS = S.phase === 'settling' ? S.springV : S.velocityPxPerFrame * 60;
  var ph = S.phase;
  if (S.phase === 'tracking' && S.lastInputAt > 0 && performance.now() - S.lastInputAt > 20) ph = 'coasting';
  var extra = '';
  if (S.phase === 'settling') {
    extra = ' | k=' + S.settleStiffness.toFixed(0) + ' c=' + S.settleDamping.toFixed(1) + ' init=' + S.settleInitSpeed.toFixed(0);
  }
  document.getElementById('hudL').textContent = ph + ' | p' + S.pageIndex + ' | g' + S.gestureId + extra;
  document.getElementById('hudR').textContent = Math.round(vPxS) + ' px/s | ' + Math.round(S.offsetPx) + 'px';
}

// ============================================================
// Sliders & UI
// ============================================================

function updateCrit() {
  var cSlow = P.dampRatio * 2 * Math.sqrt(P.stiffSlow);
  var cFast = P.dampRatio * 2 * Math.sqrt(P.stiffFast);
  document.getElementById('critSlow').textContent = P.stiffSlow;
  document.getElementById('critSlowC').textContent = cSlow.toFixed(1);
  document.getElementById('critFast').textContent = P.stiffFast;
  document.getElementById('critFastC').textContent = cFast.toFixed(1);
  var el = document.getElementById('dampSt');
  if (P.dampRatio > 1.05) { el.textContent = 'overdamped'; el.style.color = '#be8a6b'; }
  else if (P.dampRatio < 0.95) { el.textContent = 'underdamped'; el.style.color = '#6ba3be'; }
  else { el.textContent = 'critical'; el.style.color = '#6bbe9b'; }
}
updateCrit();

function bs(sid, vid, key, parse, extra) {
  document.getElementById(sid).addEventListener('input', function() {
    P[key] = parse(this.value);
    var v = P[key];
    document.getElementById(vid).textContent = typeof v === 'number' && v % 1 !== 0 ? v.toFixed(2) : v;
    if (extra) extra();
  });
}
bs('sSs', 'vSs', 'stiffSlow', function(v) { return parseInt(v); }, updateCrit);
bs('sSf', 'vSf', 'stiffFast', function(v) { return parseInt(v); }, updateCrit);
bs('sDr', 'vDr', 'dampRatio', parseFloat, updateCrit);
bs('sVt', 'vVt', 'velThreshold', function(v) { return parseInt(v); });
bs('sG', 'vG', 'followGain', parseFloat);
bs('sC', 'vC', 'commitDistanceRatio', parseFloat);
bs('sR', 'vR', 'releaseGraceMs', function(v) { return parseInt(v); });
bs('sCd', 'vCd', 'coastDecay', parseFloat);

document.getElementById('bReset').addEventListener('click', function() {
  P.followGain = 1.00; P.edgeResistance = 0.20; P.commitDistanceRatio = 0.15;
  P.flickVelocity = 0.80; P.directFlickVelocity = 1.60; P.microReverseTolerance = 0.03;
  P.releaseGraceMs = 80; P.stiffSlow = 20; P.stiffFast = 55; P.dampRatio = 1.00;
  P.velThreshold = 800; P.coastDecay = 0.95;
  var pairs = [['sSs','vSs','stiffSlow'],['sSf','vSf','stiffFast'],['sDr','vDr','dampRatio'],
    ['sVt','vVt','velThreshold'],['sG','vG','followGain'],
    ['sC','vC','commitDistanceRatio'],['sR','vR','releaseGraceMs'],['sCd','vCd','coastDecay']];
  for (var i = 0; i < pairs.length; i++) {
    var v = P[pairs[i][2]];
    document.getElementById(pairs[i][0]).value = v;
    document.getElementById(pairs[i][1]).textContent = typeof v === 'number' && v % 1 !== 0 ? v.toFixed(2) : v;
  }
  updateCrit();
});

document.getElementById('bCopy').addEventListener('click', function() {
  var t = '// v4.15d + Spring Settle — confirmed\n' +
    'followGain: ' + P.followGain.toFixed(2) + ',\n' +
    'commitDistanceRatio: ' + P.commitDistanceRatio.toFixed(2) + ',\n' +
    'releaseGraceMs: ' + P.releaseGraceMs + ',\n' +
    'stiffSlow: ' + P.stiffSlow + ',\n' +
    'stiffFast: ' + P.stiffFast + ',\n' +
    'dampRatio: ' + P.dampRatio.toFixed(2) + ',\n' +
    'velThreshold: ' + P.velThreshold + ',\n' +
    'coastDecay: ' + P.coastDecay.toFixed(2) + ',';
  navigator.clipboard.writeText(t).then(function() {
    var b = document.getElementById('bCopy');
    b.textContent = 'Copied!'; setTimeout(function() { b.textContent = 'Copy'; }, 1200);
  });
});

// Init
(function() { S.offsetPx = 0; setTx(); updateHUD(); })();
</script>
