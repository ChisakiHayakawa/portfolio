/* ═══════════════════════════════════════════════
   B-SIDE — Setlist Index
   v23.3 / flip-back-title中央寄せ + 待機短縮
   ═══════════════════════════════════════════════ */

:root {
  --font: "mr-eaves-xl-modern", "fot-tsukuardgothic-std", "Noto Sans JP", sans-serif;
  --font-serif: "mrs-eaves-roman-lining", serif;

  --color-title: #1c1b18;
  --color-credit: #6e6b63;
  --color-note: #a3a099;
  --color-rule: #d4d1c9;
  --color-bg: #f9f7f4;

  --s1:    8px;
  --s2:   16px;
  --s3:   24px;
  --s4:   32px;
  --s5:   48px;
  --s6:   64px;

  --t-xs:   0.75rem;
  --t-sm:   0.875rem;
  --t-md:   1rem;
  --t-lg:   1.375rem;
  --t-xl:   1.75rem;
  --t-2xl:  2.5rem;

  --lh:       1.7;
  --lh-tight: 1.2;

  --max: 56rem;

  --cover-ts: clamp(36px, 7vw, 60px);
  --thumb-ts: clamp(22px, 3.5vw, 36px);
  --mid-ts:   clamp(28px, 5vw, 46px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  font-size: var(--t-md);
  font-weight: 300;
  line-height: var(--lh);
  background: var(--color-bg);
  color: var(--color-title);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection { background: var(--color-title); color: var(--color-bg); }

a {
  color: var(--color-title);
  text-decoration: none;
  border-bottom: 1px solid var(--color-title);
}
a:hover { opacity: 0.5; }

/* ── CONTAINER — フッターをビューポート下部に ── */
.container {
  max-width: var(--max);
  margin: 0 auto;
  padding: var(--s5);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.container > main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── HERO WRAPPER — コンテンツ領域 ── */
.hero-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── HERO GRID — 1カラム縦積み ── */
.hero-grid {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 540px;
  margin: 0 auto;
}

/* ── SITE IDENTITY — B-SIDE + サブタイトル ── */
.site-identity {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: var(--s6);
}

.site-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 400;
  line-height: var(--lh-tight);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--color-title);
}

.site-subtitle {
  font-family: var(--font-serif);
  font-size: clamp(0.75rem, 1.3vw, 0.95rem);
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--color-title);
  margin-top: var(--s1);
}

/* ── COVER THUMBNAIL ── */
.cover-thumb {
  display: block;
  border-bottom: none;
  position: relative;
  cursor: pointer;
  perspective: 1200px;
}
.cover-thumb:hover { opacity: 1; }

/* ── FLIP SHELL — ホバー担当（transform-origin: center bottom） ── */
.flip-shell {
  width: 100%;
  aspect-ratio: 16 / 9;
  position: relative;
  transform-origin: center bottom;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 2px 8px rgba(28, 27, 24, 0.15);
}

/* ── HOVER: リフト＋傾き（PCのみ） ── */
@media (hover: hover) {
  .cover-thumb:hover .flip-shell {
    transform: translateY(-7px) rotateX(-4deg);
    box-shadow:
      0 18px 56px rgba(28, 27, 24, 0.22),
      0 4px 12px rgba(28, 27, 24, 0.1),
      0 0 0 1px rgba(180, 175, 160, 0.25),
      0 0 24px rgba(180, 175, 160, 0.08);
  }
}

/* ── タッチデバイスではホバー効果なし ── */
@media (hover: none) {
  .flip-shell {
    transition: none;
    box-shadow: none;
  }
}

/* ── FLIP CARD — フリップ担当（transform-origin: center center） ── */
.flip-card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transform-origin: center center;
}

.flip-front,
.flip-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

.flip-front {
  background: var(--color-title);
  color: #f0f0f0;
  font-family: var(--font);
}

.flip-back {
  background: var(--color-title);
  color: #f0f0f0;
  transform: rotateX(180deg);
}

.flip-back-title {
  font-family: var(--font-serif);
  font-size: var(--mid-ts);
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.01em;
  white-space: nowrap;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.cover-thumb-no {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.4;
  position: absolute;
  left: 50%;
  bottom: calc(50% + var(--thumb-ts) * 1.5);
  transform: translateX(-50%);
  white-space: nowrap;
}

.cover-thumb-title {
  font-family: var(--font-serif);
  font-size: var(--thumb-ts);
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.01em;
  position: absolute;
  left: 50%;
  bottom: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  margin: 0;
}

.cover-thumb-sub {
  font-size: 13px;
  font-weight: 300;
  opacity: 0.5;
  line-height: 1.8;
  position: absolute;
  left: 50%;
  top: calc(50% + var(--thumb-ts) * 0.83);
  transform: translateX(-50%);
  text-align: center;
  margin: 0;
}

/* ── FOOTER BAR ── */
.footer-bar {
  margin-top: var(--s5);
  padding-top: var(--s3);
  border-top: 1px solid var(--color-rule);
  max-width: 540px;
  margin-left: auto;
  margin-right: auto;
}

.footer-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s3);
}

.footer-copy {
  font-size: var(--t-xs);
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--color-credit);
}

.footer-note {
  font-size: var(--t-xs);
  font-weight: 300;
  line-height: 1.8;
  color: var(--color-note);
  margin-top: var(--s4);
}

.footer-links {
  display: flex;
  gap: var(--s2);
  flex-shrink: 0;
}
.footer-links a {
  border-bottom: none;
  color: var(--color-credit);
}
.footer-links a:hover { opacity: 0.5; }
.footer-links svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
  display: block;
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .container {
    padding: clamp(32px, 6vh, 80px) var(--s3) var(--s3);
    min-height: auto;
  }
  .hero-wrapper {
    align-items: flex-start;
  }
  .hero-grid {
    max-width: none;
  }
  .site-identity {
    margin-bottom: var(--s5);
  }
  .flip-shell {
    aspect-ratio: 4 / 3;
  }
  .footer-bar {
    margin-top: var(--s5);
  }
}
</style>

<script>
// ── ブラウザバック時の状態リセット ──
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    const shell = document.querySelector('.flip-shell');
    const card = document.querySelector('.flip-card');
    if (shell) shell.removeAttribute('style');
    if (card) card.removeAttribute('style');
    // フェードオーバーレイが残っていたら除去
    const leftover = document.getElementById('bside-fade-overlay');
    if (leftover) leftover.remove();
    animating = false;
  }
});

// ── CLOSINGからの逆遷移（暗転→フェードイン） ──
(function() {
  if (!sessionStorage.getItem('bside-reverse')) return;
  sessionStorage.removeItem('bside-reverse');

  const overlay = document.createElement('div');
  overlay.id = 'bside-fade-overlay';
  overlay.style.cssText =
    'position:fixed;inset:0;background:#1c1b18;z-index:9999;opacity:1;pointer-events:none;';
  document.body.appendChild(overlay);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      overlay.style.transition = 'opacity 0.8s cubic-bezier(0.22, 0.61, 0.36, 1)';
      overlay.style.opacity = '0';

      let done = false;
      function complete() {
        if (done) return;
        done = true;
        overlay.remove();
      }
      overlay.addEventListener('transitionend', complete);
      setTimeout(complete, 1000);
    });
  });
})();

// ── 順方向遷移（リフト＆フリップ） ──
const thumb = document.getElementById('cover-thumb');
const dest = thumb.getAttribute('href');
const flipShell = thumb.querySelector('.flip-shell');
const flipCard = thumb.querySelector('.flip-card');
const isTouch = window.matchMedia('(hover: none)').matches;
let animating = false;

function doFlip() {
  // ホバーのtransformをクリアしてからフリップ開始（干渉防止）
  flipShell.style.transition = 'none';
  flipShell.style.transform = 'none';
  flipShell.style.boxShadow = 'none';

  const flipEase = 'cubic-bezier(0.4, 0, 0.15, 1)';
  flipCard.style.transition = 'transform 0.75s ' + flipEase;
  flipCard.style.transform = 'rotateX(-180deg)';

  let flipDone = false;
  function afterFlip() {
    if (flipDone) return;
    flipDone = true;

    // 800ms待ち → ダークフェード → ページ遷移
    setTimeout(() => {
      const overlay = document.createElement('div');
      overlay.id = 'bside-fade-overlay';
      overlay.style.cssText =
        'position:fixed;inset:0;background:#1c1b18;z-index:9999;opacity:0;pointer-events:none;';
      document.body.appendChild(overlay);

      // レイアウト強制 → トランジション開始
      overlay.offsetHeight;
      overlay.style.transition = 'opacity 0.5s ease';
      overlay.style.opacity = '1';

      let navigated = false;
      function navigate() {
        if (navigated) return;
        navigated = true;
        sessionStorage.setItem('bside-forward', '1');
        window.location.href = dest;
      }
      overlay.addEventListener('transitionend', navigate);
      setTimeout(navigate, 650);
    }, 650);
  }

  flipCard.addEventListener('transitionend', function onFlipEnd(ev) {
    if (ev.propertyName === 'transform') {
      flipCard.removeEventListener('transitionend', onFlipEnd);
      afterFlip();
    }
  });
  setTimeout(afterFlip, 1000);
}

thumb.addEventListener('click', (e) => {
  e.preventDefault();
  if (animating) return;
  animating = true;

  if (isTouch) {
    // モバイル: ため（350ms）→ フリップ
    flipShell.style.transition = 'transform 350ms cubic-bezier(0.4, 0, 0.2, 1), box-shadow 350ms cubic-bezier(0.4, 0, 0.2, 1)';
    flipShell.style.transform = 'translateY(-7px) rotateX(-4deg)';
    flipShell.style.boxShadow = '0 18px 56px rgba(28,27,24,0.22), 0 4px 12px rgba(28,27,24,0.1)';
    setTimeout(doFlip, 350);
  } else {
    // PC: ホバーで既にリフト済み → 即フリップ
    doFlip();
  }
});
</script>
