<style>
/* ═══════════════════════════════════════════════
   B-SIDE — Setlist Index
   v14.0 / 遷移エンドポイント更新
   ═══════════════════════════════════════════════ */

:root {
  --font: "mr-eaves-xl-modern", "Noto Sans JP", sans-serif;
  --font-serif: "mrs-eaves-roman-lining", serif;

  --color-title: #1c1b18;
  --color-credit: #6e6b63;
  --color-note: #a3a099;
  --color-rule: #d4d1c9;
  --color-bg: #f9f7f4;

  --s1:    8px;
  --s2:   16px;
  --s3:   24px;
  --s4:   32px;
  --s5:   48px;
  --s6:   64px;

  --t-xs:   0.75rem;
  --t-sm:   0.875rem;
  --t-md:   1rem;
  --t-lg:   1.375rem;
  --t-xl:   1.75rem;
  --t-2xl:  2.5rem;

  --lh:       1.7;
  --lh-tight: 1.2;

  --max: 56rem;

  --thumb-ts: clamp(22px, 3.5vw, 36px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  font-size: var(--t-md);
  font-weight: 300;
  line-height: var(--lh);
  background: var(--color-bg);
  color: var(--color-title);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection { background: var(--color-title); color: var(--color-bg); }

a {
  color: var(--color-title);
  text-decoration: none;
  border-bottom: 1px solid var(--color-title);
}
a:hover { opacity: 0.5; }

/* ── CONTAINER — フッターをビューポート下部に ── */
.container {
  max-width: var(--max);
  margin: 0 auto;
  padding: var(--s5);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.container > main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── HERO WRAPPER — コンテンツ領域 ── */
.hero-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── HERO GRID — 1カラム縦積み ── */
.hero-grid {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 540px;
  margin: 0 auto;
}

/* ── SITE IDENTITY — B-SIDE + サブタイトル ── */
.site-identity {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: var(--s6);
}

.site-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 400;
  line-height: var(--lh-tight);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--color-title);
}

.site-subtitle {
  font-family: var(--font-serif);
  font-size: clamp(0.75rem, 1.3vw, 0.95rem);
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--color-title);
  margin-top: var(--s1);
}

/* ── COVER THUMBNAIL ── */
.cover-thumb {
  display: block;
  border-bottom: none;
  position: relative;
  cursor: pointer;
}
.cover-thumb:hover { opacity: 1; }

.cover-thumb-inner {
  background: var(--color-title);
  color: #f0f0f0;
  display: block;
  aspect-ratio: 16 / 9;
  font-family: var(--font);
  position: relative;
  overflow: hidden;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 2px 8px rgba(28, 27, 24, 0.15);
}

/* ── HOVER: G1 リフト + エッジグロウ ── */
.cover-thumb:hover .cover-thumb-inner {
  transform: translateY(-6px) scale(1.01);
  box-shadow:
    0 12px 40px rgba(28, 27, 24, 0.25),
    0 4px 12px rgba(28, 27, 24, 0.1),
    0 0 0 1px rgba(180, 175, 160, 0.25),
    0 0 24px rgba(180, 175, 160, 0.08);
}

/* ── HOVER: タッチデバイスではリフト無効 ── */
@media (hover: none) {
  .cover-thumb-inner {
    transition: none;
    box-shadow: none;
  }
}

.cover-thumb-no {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.4;
  position: absolute;
  left: 50%;
  bottom: calc(50% + var(--thumb-ts) * 1.5);
  transform: translateX(-50%);
  white-space: nowrap;
}

.cover-thumb-title {
  font-family: var(--font-serif);
  font-size: var(--thumb-ts);
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.01em;
  position: absolute;
  left: 50%;
  bottom: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  margin: 0;
}

.cover-thumb-sub {
  font-size: 13px;
  font-weight: 300;
  opacity: 0.5;
  line-height: 1.8;
  position: absolute;
  left: 50%;
  top: calc(50% + var(--thumb-ts) * 0.83);
  transform: translateX(-50%);
  text-align: center;
  margin: 0;
}

/* ── FOOTER BAR ── */
.footer-bar {
  margin-top: var(--s5);
  padding-top: var(--s3);
  border-top: 1px solid var(--color-rule);
  max-width: 540px;
  margin-left: auto;
  margin-right: auto;
}

.footer-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s3);
}

.footer-copy {
  font-size: var(--t-xs);
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--color-credit);
}

.footer-note {
  font-size: var(--t-xs);
  font-weight: 300;
  line-height: 1.8;
  color: var(--color-note);
  margin-top: var(--s4);
}

.footer-links {
  display: flex;
  gap: var(--s2);
  flex-shrink: 0;
}
.footer-links a {
  border-bottom: none;
  color: var(--color-credit);
}
.footer-links a:hover { opacity: 0.5; }
.footer-links svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
  display: block;
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .container {
    padding: clamp(32px, 6vh, 80px) var(--s3) var(--s3);
    min-height: auto;
  }
  .hero-wrapper {
    align-items: flex-start;
  }
  .hero-grid {
    max-width: none;
  }
  .site-identity {
    margin-bottom: var(--s5);
  }
  .cover-thumb-inner {
    aspect-ratio: 4 / 3;
  }
  .footer-bar {
    margin-top: var(--s5);
  }
}
</style>
</head>

<body>

<script>
// ── ブラウザバック時の状態リセット ──
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    const t = document.getElementById('cover-thumb');
    const inner = t.querySelector('.cover-thumb-inner');
    const title = t.querySelector('.cover-thumb-title');
    const no = t.querySelector('.cover-thumb-no');
    const sub = t.querySelector('.cover-thumb-sub');
    [t, inner, title, no, sub].forEach(el => el.removeAttribute('style'));
  }
});

// ── CLOSINGからの逆遷移 ──
(function() {
  if (!sessionStorage.getItem('bside-reverse')) return;
  sessionStorage.removeItem('bside-reverse');

  const thumb = document.getElementById('cover-thumb');
  const thumbTitle = thumb.querySelector('.cover-thumb-title');
  const no = thumb.querySelector('.cover-thumb-no');
  const sub = thumb.querySelector('.cover-thumb-sub');

  // 1. サムネイルの自然な位置を取得（ページレイアウトはそのまま）
  const rect = thumb.getBoundingClientRect();
  const vw = window.innerWidth;
  const vh = Math.max(window.innerHeight, document.documentElement.clientHeight);
  const ease = 'cubic-bezier(0.22, 0.61, 0.36, 1)';
  const dur = '1.4s';

  // アニメーション中はthumb内のタイトル・No./Subを非表示（オーバーレイが代役）
  thumbTitle.style.opacity = '0';
  thumbTitle.style.transition = 'none';
  no.style.opacity = '0';
  no.style.transition = 'none';
  sub.style.opacity = '0';
  sub.style.transition = 'none';

  // 2. JUDD | Marfaタイトル付きのダーク全画面オーバーレイを生成
  //    → ページ全体（B-Side/フッター/クリーム背景）は最初から表示されたまま
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position: fixed; top: 0; left: 0;
    width: ${vw}px; height: ${vh}px;
    background: #1c1b18;
    z-index: 1000;
    overflow: hidden;
    pointer-events: none;
  `;

  // judd-indexカバーと同じ大きいフォントサイズ → thumbタイトルサイズへ縮小
  const largePx = Math.min(60, Math.max(36, vw * 0.07));
  const smallPx = Math.min(36, Math.max(22, vw * 0.035));
  const overlayTitle = document.createElement('div');
  overlayTitle.textContent = 'JUDD | Marfa';
  overlayTitle.style.cssText = `
    font-family: "mrs-eaves-roman-lining", serif;
    font-size: ${largePx}px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.01em;
    color: #f0f0f0;
    white-space: nowrap;
    position: absolute;
    left: 50%; bottom: 50%;
    transform: translateX(-50%);
  `;
  overlay.appendChild(overlayTitle);
  document.body.appendChild(overlay);

  // 3. 次フレームでオーバーレイをサムネイル位置・サイズに縮小、タイトルも縮小
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      overlay.style.transition = `all ${dur} ${ease}`;
      overlay.style.top = rect.top + 'px';
      overlay.style.left = rect.left + 'px';
      overlay.style.width = rect.width + 'px';
      overlay.style.height = rect.height + 'px';

      overlayTitle.style.transition = `font-size ${dur} ${ease}`;
      overlayTitle.style.fontSize = smallPx + 'px';

      // 4. 縮小95%時点で No./Sub をフェードイン
      setTimeout(() => {
        no.style.transition = 'opacity 0.5s ' + ease;
        sub.style.transition = 'opacity 0.5s ' + ease;
        no.style.opacity = '';
        sub.style.opacity = '';
      }, 1330);

      // 5. 縮小完了 → オーバーレイ削除・thumbタイトル復元
      //    bottom:50%がCSS側でも設定済み → 位置一致でカクツキなし
      overlay.addEventListener('transitionend', function onShrink(ev) {
        if (ev.propertyName !== 'width') return;
        overlay.removeEventListener('transitionend', onShrink);
        overlay.remove();
        thumbTitle.removeAttribute('style');

        setTimeout(() => {
          [no, sub].forEach(el => el.removeAttribute('style'));
        }, 500);
      });
    });
  });
})();

// ── フルスクリーン遷移 ──
const thumb = document.getElementById('cover-thumb');
const dest = thumb.getAttribute('href');

thumb.addEventListener('click', (e) => {
  e.preventDefault();

  const rect = thumb.getBoundingClientRect();
  const inner = thumb.querySelector('.cover-thumb-inner');
  const title = thumb.querySelector('.cover-thumb-title');
  const no = thumb.querySelector('.cover-thumb-no');
  const sub = thumb.querySelector('.cover-thumb-sub');

  // 現在位置を固定
  thumb.style.position = 'fixed';
  thumb.style.top = rect.top + 'px';
  thumb.style.left = rect.left + 'px';
  thumb.style.width = rect.width + 'px';
  thumb.style.height = rect.height + 'px';
  thumb.style.zIndex = '1000';
  thumb.style.margin = '0';

  // hover reset
  inner.style.transform = 'none';
  inner.style.boxShadow = 'none';

  // 次フレームでフルスクリーンへアニメーション
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const dur = '1.4s';
      const ease = 'cubic-bezier(0.22, 0.61, 0.36, 1)';

      // サムネイルをフルスクリーンに展開
      // iPadではツールバーの影響でwindow.innerHeightが画面より短くなる場合がある
      // 少しオーバーサイズにして隙間を防ぐ（overflow:hiddenでクリップされる）
      const vh = Math.max(window.innerHeight, document.documentElement.clientHeight);
      thumb.style.transition = `all ${dur} ${ease}`;
      thumb.style.top = '0';
      thumb.style.left = '0';
      thumb.style.width = window.innerWidth + 'px';
      thumb.style.height = vh + 'px';

      // インナーをフルスクリーンに
      inner.style.transition = `all ${dur} ${ease}`;
      inner.style.aspectRatio = 'auto';
      inner.style.height = '100%';

      // No. と Sub をscale収束でフェードアウト
      no.style.transition = `opacity 0.8s ${ease}, transform 0.8s ${ease}`;
      sub.style.transition = `opacity 0.8s ${ease}, transform 0.8s ${ease}`;
      no.style.opacity = '0';
      no.style.transform = 'translateX(-50%) scale(0.85) translateY(4px)';
      sub.style.opacity = '0';
      sub.style.transform = 'translateX(-50%) scale(0.85) translateY(-4px)';

      // タイトルをjudd-indexカバーの大サイズに拡大（bottom:50%/position:absoluteはCSS側で設定済み）
      title.style.transition = `font-size 1.4s cubic-bezier(0.22, 0.61, 0.36, 1)`;
      title.style.fontSize = 'clamp(36px, 7vw, 60px)';

      // アニメーション完了後に遷移（widthの完了で判定）
      thumb.addEventListener('transitionend', (ev) => {
        if (ev.propertyName === 'width') {
          window.location.href = dest;
        }
      });
    });
  });
});
</script>
