<style>
/* ═══════════════════════════════════════════════
   B-SIDE — Setlist Index
   v11.0 / ナビバー削除・余白3層・サブタイトルclamp・フッター540px
   ═══════════════════════════════════════════════ */

:root {
  --font: "mr-eaves-xl-modern", "Noto Sans JP", sans-serif;
  --font-serif: "mrs-eaves-roman-lining", serif;

  --color-title: #1c1b18;
  --color-credit: #6e6b63;
  --color-note: #a3a099;
  --color-rule: #d4d1c9;
  --color-bg: #f9f7f4;

  --s1:    8px;
  --s2:   16px;
  --s3:   24px;
  --s4:   32px;
  --s5:   48px;
  --s6:   64px;

  --t-xs:   0.75rem;
  --t-sm:   0.875rem;
  --t-md:   1rem;
  --t-lg:   1.375rem;
  --t-xl:   1.75rem;
  --t-2xl:  2.5rem;

  --lh:       1.7;
  --lh-tight: 1.2;

  --max: 56rem;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  font-size: var(--t-md);
  font-weight: 300;
  line-height: var(--lh);
  background: var(--color-bg);
  color: var(--color-title);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection { background: var(--color-title); color: var(--color-bg); }

a {
  color: var(--color-title);
  text-decoration: none;
  border-bottom: 1px solid var(--color-title);
}
a:hover { opacity: 0.5; }

/* ── CONTAINER — フッターをビューポート下部に ── */
.container {
  max-width: var(--max);
  margin: 0 auto;
  padding: var(--s5);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.container > main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── HERO WRAPPER — コンテンツ領域 ── */
.hero-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── HERO GRID — 1カラム縦積み ── */
.hero-grid {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 540px;
  margin: 0 auto;
}

/* ── SITE IDENTITY — B-SIDE + サブタイトル ── */
.site-identity {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: var(--s6);
}

.site-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 400;
  line-height: var(--lh-tight);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--color-title);
}

.site-subtitle {
  font-family: var(--font-serif);
  font-size: clamp(0.75rem, 1.3vw, 0.95rem);
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--color-title);
  margin-top: var(--s1);
}

/* ── COVER THUMBNAIL ── */
.cover-thumb {
  display: block;
  border-bottom: none;
  transition: opacity 0.2s;
}
.cover-thumb:hover { opacity: 0.85; }

.cover-thumb-inner {
  background: var(--color-title);
  color: #f0f0f0;
  padding: var(--s5) var(--s4);
  display: flex;
  flex-direction: column;
  justify-content: center;
  aspect-ratio: 16 / 9;
  font-family: var(--font);
}

.cover-thumb-no {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.4;
  margin-bottom: 12px;
}

.cover-thumb-title {
  font-family: var(--font-serif);
  font-size: clamp(22px, 3.5vw, 36px);
  font-weight: 400;
  line-height: 1.3;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
}

.cover-thumb-sub {
  font-size: 13px;
  font-weight: 300;
  opacity: 0.5;
  line-height: 1.8;
}

/* ── FOOTER BAR ── */
.footer-bar {
  margin-top: var(--s5);
  padding-top: var(--s3);
  border-top: 1px solid var(--color-rule);
  max-width: 540px;
  margin-left: auto;
  margin-right: auto;
}

.footer-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s3);
}

.footer-copy {
  font-size: var(--t-xs);
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--color-credit);
}

.footer-note {
  font-size: var(--t-xs);
  font-weight: 300;
  line-height: 1.8;
  color: var(--color-note);
  margin-top: var(--s4);
}

.footer-links {
  display: flex;
  gap: var(--s2);
  flex-shrink: 0;
}
.footer-links a {
  border-bottom: none;
  color: var(--color-credit);
}
.footer-links a:hover { opacity: 0.5; }
.footer-links svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
  display: block;
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .container {
    padding: clamp(32px, 6vh, 80px) var(--s3) var(--s3);
    min-height: auto;
  }
  .hero-wrapper {
    align-items: flex-start;
  }
  .hero-grid {
    max-width: none;
  }
  .site-identity {
    margin-bottom: var(--s5);
  }
  .cover-thumb-inner {
    aspect-ratio: 4 / 3;
  }
  .footer-bar {
    margin-top: var(--s5);
  }
}
</style>
</head>
